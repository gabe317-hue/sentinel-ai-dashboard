<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel-AI MVP Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy-light: #162447;
  --electric: #00c8ff;
  --green: #00e676;
  --amber: #ffab00;
  --red: #ff3d57;
  --text: #e8edf5;
  --text-dim: #7a8ba8;
  --border: rgba(0,200,255,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; padding: 40px 20px; }
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 60px; }
.header h1 { font-family: 'Syne'; font-size: 36px; margin-bottom: 10px; }
.header p { color: var(--text-dim); font-size: 14px; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
.stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
.stat-value { font-size: 40px; font-weight: bold; margin-bottom: 5px; }
.stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }

.btn { background: rgba(0,200,255,0.2); border: 1px solid var(--electric); color: var(--electric); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-family: 'Inter'; }
.btn:hover { background: rgba(0,200,255,0.3); }

.table-wrapper { overflow-x: auto; }
.alert-table { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.alert-table th { background: rgba(0,200,255,0.08); padding: 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.alert-table td { padding: 14px; border-bottom: 1px solid rgba(0,200,255,0.05); }
.alert-table tr:hover { background: rgba(0,200,255,0.04); }

.severity { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.severity.critica { color: var(--red); background: rgba(255,61,87,0.1); }
.severity.alta { color: #ff6b35; background: rgba(255,107,53,0.1); }
.severity.media { color: var(--amber); background: rgba(255,171,0,0.1); }
.severity.baja { color: var(--green); background: rgba(0,230,118,0.1); }

.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
.modal.active { display: flex; }
.modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 12px; padding: 28px; max-width: 500px; width: 90%; }
.modal h2 { margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; margin-bottom: 6px; color: var(--text-dim); font-weight: 600; }
.form-group input, .form-group textarea, .form-group select { width: 100%; background: rgba(0,200,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-family: inherit; font-size: 14px; }

.severity-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 16px 0; }
.sev-btn { padding: 10px; border: 2px solid transparent; border-radius: 6px; cursor: pointer; font-weight: 600; opacity: 0.5; }
.sev-btn.critica { background: rgba(255,61,87,0.2); border-color: var(--red); color: var(--red); }
.sev-btn.alta { background: rgba(255,107,53,0.2); border-color: #ff6b35; color: #ff6b35; }
.sev-btn.media { background: rgba(255,171,0,0.2); border-color: var(--amber); color: var(--amber); }
.sev-btn.baja { background: rgba(0,230,118,0.2); border-color: var(--green); color: var(--green); }
.sev-btn.active { opacity: 1; border-color: currentColor; }

.modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
.btn-save { flex: 1; background: rgba(0,200,255,0.2); border: 1px solid var(--electric); color: var(--electric); }
.btn-cancel { flex: 1; background: rgba(255,61,87,0.2); border: 1px solid var(--red); color: var(--red); }

.action-buttons { display: flex; gap: 6px; }
.btn-sm { padding: 6px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; }
.btn-pgr { background: rgba(0,200,255,0.2); color: var(--electric); border: 1px solid var(--electric); }
.btn-del { background: rgba(255,61,87,0.2); color: var(--red); border: 1px solid var(--red); }

.controls { margin-bottom: 30px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🛡️ Sentinel-AI MVP</h1>
    <p>Sistema Nacional Anticorrupción de Honduras — Week 3 Testing</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="cnt-critica">0</div>
      <div class="stat-label">Críticas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="cnt-alta">0</div>
      <div class="stat-label">Altas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="cnt-media">0</div>
      <div class="stat-label">Medias</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="cnt-baja">0</div>
      <div class="stat-label">Bajas</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="openModal()">➕ Nueva Alerta</button>
  </div>

  <div class="table-wrapper">
    <table class="alert-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Entidad</th>
          <th>Severidad</th>
          <th>Fuente</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tb">
        <tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-dim);">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="mod">
  <div class="modal-content">
    <h2>Nueva Alerta</h2>
    
    <div class="form-group">
      <label>Descripción *</label>
      <textarea id="f-desc" placeholder="Describe el patrón sospechoso..." rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>Entidad *</label>
      <input type="text" id="f-ent" placeholder="Empresa, persona o individuo">
    </div>

    <div class="form-group">
      <label>Fuente *</label>
      <select id="f-src">
        <option>HonduCompras</option>
        <option>TSC</option>
        <option>La Prensa</option>
        <option>Reportero Ciudadano</option>
        <option>IAIP</option>
      </select>
    </div>

    <div class="form-group">
      <label>Severidad *</label>
      <div class="severity-buttons">
        <button type="button" class="sev-btn baja" onclick="setSev('baja')">BAJA</button>
        <button type="button" class="sev-btn media" onclick="setSev('media')">MEDIA</button>
        <button type="button" class="sev-btn alta" onclick="setSev('alta')">ALTA</button>
        <button type="button" class="sev-btn critica" onclick="setSev('critica')">CRÍTICA</button>
      </div>
    </div>

    <div class="modal-buttons">
      <button class="btn btn-save" onclick="saveAlert()">Guardar</button>
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// GLOBAL STATE
// ════════════════════════════════════════════════════════════════════
let alerts = [];
let selSev = null;
let counter = 1000;

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
function init() {
  loadFromStorage();
  render();
}

function loadFromStorage() {
  const saved = localStorage.getItem('sentinel_alerts');
  alerts = saved ? JSON.parse(saved) : [];
  
  // Fix any severity values that got stored incorrectly
  alerts.forEach(a => {
    if (a.severity === 'Crítica' || a.severity === 'crítica' || a.severity === 'CRÍTICA') {
      a.severity = 'Crítica';
    } else if (a.severity === 'Alta' || a.severity === 'alta' || a.severity === 'ALTA') {
      a.severity = 'Alta';
    } else if (a.severity === 'Media' || a.severity === 'media' || a.severity === 'MEDIA') {
      a.severity = 'Media';
    } else if (a.severity === 'Baja' || a.severity === 'baja' || a.severity === 'BAJA') {
      a.severity = 'Baja';
    }
  });
  
  saveToStorage(); // Save corrected values
}

function saveToStorage() {
  localStorage.setItem('sentinel_alerts', JSON.stringify(alerts));
}

// ════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════
function render() {
  // Update stats
  const stats = { critica: 0, alta: 0, media: 0, baja: 0 };
  alerts.forEach(a => {
    const sev = a.severity.toLowerCase().replace('á', 'a'); // Remove accent
    if (sev in stats) stats[sev]++;
  });
  
  document.getElementById('cnt-critica').textContent = stats.critica;
  document.getElementById('cnt-alta').textContent = stats.alta;
  document.getElementById('cnt-media').textContent = stats.media;
  document.getElementById('cnt-baja').textContent = stats.baja;

  // Render table
  const tb = document.getElementById('tb');
  if (alerts.length === 0) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-dim);">No hay alertas. Crea una nueva.</td></tr>';
    return;
  }

  tb.innerHTML = alerts.map(a => `
    <tr>
      <td style="font-family: 'JetBrains Mono'; font-size: 12px;">${a.id}</td>
      <td>${a.desc.substring(0, 50)}...</td>
      <td>${a.ent}</td>
      <td><span class="severity ${a.severity.toLowerCase()}">${a.severity}</span></td>
      <td>${a.src}</td>
      <td>${a.status}</td>
      <td>
        <div class="action-buttons">
          <button class="btn-sm btn-pgr" onclick="sendPGR('${a.id}')">📤</button>
          <button class="btn-sm btn-del" onclick="delAlert('${a.id}')">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

// ════════════════════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════════════════════
function openModal() {
  selSev = null;
  document.getElementById('f-desc').value = '';
  document.getElementById('f-ent').value = '';
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mod').classList.add('active');
}

function closeModal() {
  document.getElementById('mod').classList.remove('active');
}

function setSev(s) {
  selSev = s;
  document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sev-btn.${s}`).classList.add('active');
}

// ════════════════════════════════════════════════════════════════════
// SAVE ALERT
// ════════════════════════════════════════════════════════════════════
function saveAlert() {
  const desc = document.getElementById('f-desc').value.trim();
  const ent = document.getElementById('f-ent').value.trim();
  const src = document.getElementById('f-src').value;

  if (!desc || !ent || !selSev) {
    alert('Completa todos los campos (*)');
    return;
  }

  const sevMap = { baja: 'Baja', media: 'Media', alta: 'Alta', critica: 'Crítica' };
  
  const newAlert = {
    id: `A-2025-${String(counter++).padStart(4, '0')}`,
    desc: desc,
    ent: ent,
    severity: sevMap[selSev],
    src: src,
    status: 'Pendiente',
    created: new Date().toISOString()
  };

  alerts.unshift(newAlert);
  saveToStorage();
  render();
  closeModal();
  
  alert('✅ Alerta guardada exitosamente');
}

// ════════════════════════════════════════════════════════════════════
// DELETE & ACTIONS
// ════════════════════════════════════════════════════════════════════
function delAlert(id) {
  if (!confirm('¿Borrar esta alerta?')) return;
  alerts = alerts.filter(a => a.id !== id);
  saveToStorage();
  render();
}

function sendPGR(id) {
  const alert = alerts.find(a => a.id === id);
  if (alert) {
    alert.status = 'Enviado a PGR';
    saveToStorage();
    render();
    alert('📤 Alerta enviada a PGR');
  }
}

// ════════════════════════════════════════════════════════════════════
// START - Run immediately, not just on DOMContentLoaded
// ════════════════════════════════════════════════════════════════════
if (document.readyState === 'loading') {
  window.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
