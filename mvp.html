<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel-AI — Sistema Nacional Anticorrupción</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-light: #162447;
    --electric: #00c8ff;
    --green: #00e676;
    --amber: #ffab00;
    --red: #ff3d57;
    --text: #e8edf5;
    --text-dim: #7a8ba8;
    --border: rgba(0,200,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--navy); color: var(--text); min-height: 100vh; }

  .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
  .header { text-align: center; margin-bottom: 60px; }
  .header h1 { font-family: 'Syne'; font-size: 32px; margin-bottom: 8px; }
  .header .subtitle { color: var(--text-dim); font-size: 14px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-align: center; }
  .stat-value { font-size: 36px; font-weight: bold; margin-bottom: 8px; }
  .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

  .controls { margin-bottom: 40px; }
  .btn { background: rgba(0,200,255,0.2); border: 1px solid var(--electric); color: var(--electric); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-family: 'Syne'; font-weight: 600; transition: all 0.2s; }
  .btn:hover { background: rgba(0,200,255,0.3); }

  .alert-table { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .alert-table th { background: rgba(0,200,255,0.08); padding: 16px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  .alert-table td { padding: 16px; border-bottom: 1px solid rgba(0,200,255,0.05); font-size: 14px; }
  .alert-table tr:hover { background: rgba(0,200,255,0.04); }

  .severity { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .severity.critica { color: var(--red); background: rgba(255,61,87,0.1); }
  .severity.alta { color: #ff6b35; background: rgba(255,107,53,0.1); }
  .severity.media { color: var(--amber); background: rgba(255,171,0,0.1); }
  .severity.baja { color: var(--green); background: rgba(0,230,118,0.1); }

  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
  .modal.active { display: flex; }
  .modal-content { background: var(--navy-light); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 600px; width: 90%; }
  .modal h2 { margin-bottom: 24px; }

  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-dim); font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; background: rgba(0,200,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; font-family: inherit; }

  .severity-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .severity-btn { padding: 12px; border: 2px solid transparent; border-radius: 6px; cursor: pointer; font-weight: 600; }
  .severity-btn.critica { background: rgba(255,61,87,0.2); border-color: var(--red); color: var(--red); }
  .severity-btn.alta { background: rgba(255,107,53,0.2); border-color: #ff6b35; color: #ff6b35; }
  .severity-btn.media { background: rgba(255,171,0,0.2); border-color: var(--amber); color: var(--amber); }
  .severity-btn.baja { background: rgba(0,230,118,0.2); border-color: var(--green); color: var(--green); }
  .severity-btn.active { opacity: 1; border-color: currentColor; }
  .severity-btn:not(.active) { opacity: 0.5; }

  .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
  .btn-primary { flex: 1; background: rgba(0,200,255,0.2); border: 1px solid var(--electric); color: var(--electric); }
  .btn-cancel { flex: 1; background: rgba(255,61,87,0.2); border: 1px solid var(--red); color: var(--red); }

  .action-btn { padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 4px; }
  .btn-pgr { background: rgba(0,200,255,0.2); color: var(--electric); border: 1px solid var(--electric); }
  .btn-delete { background: rgba(255,61,87,0.2); color: var(--red); border: 1px solid var(--red); }

  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🛡️ <span style="color: var(--electric);">Sentinel</span>-AI</h1>
    <p class="subtitle">Sistema Nacional Anticorrupción de Honduras</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="count-critica">0</div>
      <div class="stat-label">Alertas Críticas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="count-alta">0</div>
      <div class="stat-label">Alertas Altas</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="count-media">0</div>
      <div class="stat-label">Alertas Medias</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="count-baja">0</div>
      <div class="stat-label">Alertas Bajas</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="openNewAlertModal()">➕ Nueva Alerta</button>
  </div>

  <table class="alert-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>Entidad</th>
        <th>Monto</th>
        <th>Severidad</th>
        <th>Fuente</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="alerts-tbody">
      <tr><td colspan="8" class="loading">Inicializando...</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal Nueva Alerta -->
<div class="modal" id="newAlertModal">
  <div class="modal-content">
    <h2>Nueva Alerta de Corrupción</h2>
    
    <div class="form-group">
      <label>Descripción</label>
      <textarea id="input-desc" placeholder="Describe el patrón sospechoso..." rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>Entidad</label>
      <input type="text" id="input-entity" placeholder="Empresa o individuo">
    </div>

    <div class="form-group">
      <label>Monto (L)</label>
      <input type="number" id="input-amount" placeholder="0">
    </div>

    <div class="form-group">
      <label>Fuente</label>
      <select id="input-source">
        <option>HonduCompras</option>
        <option>TSC</option>
        <option>La Prensa</option>
        <option>Reportero Ciudadano</option>
        <option>IAIP</option>
      </select>
    </div>

    <div class="form-group">
      <label>Severidad</label>
      <div class="severity-buttons">
        <button type="button" class="severity-btn baja" onclick="selectSeverity('baja')">BAJA</button>
        <button type="button" class="severity-btn media" onclick="selectSeverity('media')">MEDIA</button>
        <button type="button" class="severity-btn alta" onclick="selectSeverity('alta')">ALTA</button>
        <button type="button" class="severity-btn critica" onclick="selectSeverity('critica')">CRÍTICA</button>
      </div>
    </div>

    <div class="modal-buttons">
      <button class="btn btn-primary" onclick="saveNewAlert()">Registrar Alerta</button>
      <button class="btn btn-cancel" onclick="closeNewAlertModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Supabase via ES Module -->
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm';
  
  const SUPABASE_URL = 'https://yxvfpeigwthtokqsarvs.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4dmZwZWlnd3RodG9rcXNhcnZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzM5MjksImV4cCI6MjA4OTAwOTkyOX0.L0PseYDJV41A1OWzlO0zrth_EJzJCcp5qz8bA8dFl9k';
  
  window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  window.supabaseReady = true;
  console.log('✅ Supabase ready (ES module)');
</script>

<script>
// ════════════════════════════════════════════════════════════════════
// SUPABASE INIT
// ════════════════════════════════════════════════════════════════════
let supabase = null;
let alerts = [];
let selectedSeverity = null;
let alertCounter = 1000;

function waitForSupabase() {
  if (window.supabaseReady && window.supabase) {
    console.log('✅ Supabase initialized');
    loadAlerts();
    setInterval(loadAlerts, 60000);
  } else {
    setTimeout(waitForSupabase, 100);
  }
}

async function loadAlerts() {
  if (!window.supabase) {
    console.error('Supabase not ready');
    return;
  }
  try {
    const { data, error } = await window.supabase.from('alerts').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    alerts = data || [];
    renderAlerts();
    updateStats();
  } catch (err) {
    console.error('Load error:', err);
  }
}

function renderAlerts() {
  const tbody = document.getElementById('alerts-tbody');
  if (!alerts.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="loading">No hay alertas</td></tr>';
    return;
  }
  tbody.innerHTML = alerts.map(a => `
    <tr>
      <td>${a.alert_id}</td>
      <td>${(a.description || '').substring(0, 50)}...</td>
      <td>${a.entity_name}</td>
      <td>${a.amount ? a.amount.toLocaleString() : '—'}</td>
      <td><span class="severity ${a.severity.toLowerCase()}">${a.severity}</span></td>
      <td>${a.source}</td>
      <td>${a.status}</td>
      <td>
        <button class="action-btn btn-pgr" onclick="sendToPGR('${a.alert_id}')">📤</button>
        <button class="action-btn btn-delete" onclick="deleteAlert('${a.alert_id}')">🗑️</button>
      </td>
    </tr>
  `).join('');
}

function updateStats() {
  document.getElementById('count-critica').textContent = alerts.filter(a => a.severity === 'Crítica').length;
  document.getElementById('count-alta').textContent = alerts.filter(a => a.severity === 'Alta').length;
  document.getElementById('count-media').textContent = alerts.filter(a => a.severity === 'Media').length;
  document.getElementById('count-baja').textContent = alerts.filter(a => a.severity === 'Baja').length;
}

function openNewAlertModal() {
  selectedSeverity = null;
  document.getElementById('input-desc').value = '';
  document.getElementById('input-entity').value = '';
  document.getElementById('input-amount').value = '';
  document.querySelectorAll('.severity-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('newAlertModal').classList.add('active');
}

function closeNewAlertModal() {
  document.getElementById('newAlertModal').classList.remove('active');
}

function selectSeverity(sev) {
  selectedSeverity = sev;
  document.querySelectorAll('.severity-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.severity-btn.${sev}`).classList.add('active');
}

async function saveNewAlert() {
  const desc = document.getElementById('input-desc').value.trim();
  const entity = document.getElementById('input-entity').value.trim();
  const amount = document.getElementById('input-amount').value;
  const source = document.getElementById('input-source').value;

  if (!desc || !entity || !selectedSeverity) {
    alert('Complete los campos');
    return;
  }

  const severityMap = { baja: 'Baja', media: 'Media', alta: 'Alta', critica: 'Crítica' };
  const newAlert = {
    alert_id: `A-2025-${String(alertCounter++).padStart(4, '0')}`,
    description: desc,
    entity_name: entity,
    severity: severityMap[selectedSeverity],
    amount: amount ? parseInt(amount) : null,
    source: source,
    status: 'Pendiente',
    created_at: new Date().toISOString()
  };

  try {
    const { error } = await window.supabase.from('alerts').insert([newAlert]);
    if (error) throw error;
    closeNewAlertModal();
    await loadAlerts();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

async function deleteAlert(id) {
  if (!confirm('¿Borrar?')) return;
  try {
    const { error } = await window.supabase.from('alerts').delete().eq('alert_id', id);
    if (error) throw error;
    await loadAlerts();
  } catch (err) {
    console.error(err);
  }
}

async function sendToPGR(id) {
  try {
    const { error } = await window.supabase.from('alerts').update({ status: 'Enviado a PGR' }).eq('alert_id', id);
    if (error) throw error;
    await loadAlerts();
  } catch (err) {
    console.error(err);
  }
}

window.addEventListener('DOMContentLoaded', waitForSupabase);
</script>

</body>
</html>
